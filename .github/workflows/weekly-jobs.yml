name: Weekly PM Job Digest

on:
  schedule:
    # Every Monday at 03:30 UTC = 09:00 IST
    - cron: '30 3 * * 1'
  workflow_dispatch:  # lets you trigger manually from the Actions tab

permissions:
  contents: write  # needed to commit seen_jobs.json back to the repo

jobs:
  run-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run job agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: python -m src.main
      
      - name: Commit updated seen_jobs.json
        run: |
          git config user.name "job-agent-bot"
          git config user.email "job-agent-bot@users.noreply.github.com"
          git add data/seen_jobs.json
          if git diff --staged --quiet; then
            echo "No changes to seen_jobs.json"
          else
            git commit -m "chore: update seen jobs [skip ci]"
            git push
          fi
